<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" width="1200" height="300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1b2a"/>
      <stop offset="45%" stop-color="#1b263b"/>
      <stop offset="100%" stop-color="#415a77"/>
    </linearGradient>
    <linearGradient id="chartFill" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#00b4d8" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#00b4d8" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="300" fill="url(#bg)"/>

  <!-- decorative grid -->
  <g stroke="#e0e1dd" stroke-opacity="0.06">
    <line x1="0" y1="60" x2="1200" y2="60"/>
    <line x1="0" y1="120" x2="1200" y2="120"/>
    <line x1="0" y1="180" x2="1200" y2="180"/>
    <line x1="0" y1="240" x2="1200" y2="240"/>
  </g>

  <!-- background price line chart, right side -->
  <g transform="translate(650,0)">
    <path d="M0,220 L40,205 L80,215 L120,180 L160,190 L200,150 L240,165 L280,120 L320,140 L360,95 L400,110 L440,70 L480,90 L520,55 L550,75 L550,300 L0,300 Z"
          fill="url(#chartFill)"/>
    <path d="M0,220 L40,205 L80,215 L120,180 L160,190 L200,150 L240,165 L280,120 L320,140 L360,95 L400,110 L440,70 L480,90 L520,55 L550,75"
          fill="none" stroke="#00b4d8" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- a few candlesticks under the line -->
    <g stroke-width="2">
      <line x1="60" y1="230" x2="60" y2="260" stroke="#2dc653"/>
      <rect x="53" y="238" width="14" height="16" fill="#2dc653"/>
      <line x1="150" y1="235" x2="150" y2="270" stroke="#ef233c"/>
      <rect x="143" y="240" width="14" height="20" fill="#ef233c"/>
      <line x1="240" y1="220" x2="240" y2="255" stroke="#2dc653"/>
      <rect x="233" y="222" width="14" height="18" fill="#2dc653"/>
      <line x1="330" y1="210" x2="330" y2="248" stroke="#2dc653"/>
      <rect x="323" y="214" width="14" height="20" fill="#2dc653"/>
      <line x1="420" y1="215" x2="420" y2="250" stroke="#ef233c"/>
      <rect x="413" y="218" width="14" height="16" fill="#ef233c"/>
    </g>
  </g>

  <!-- title block -->
  <g transform="translate(60,95)">
    <text x="0" y="0" font-family="Arial, Helvetica, sans-serif" font-size="30" fill="#00b4d8">📈</text>
    <text x="42" y="0" font-family="Arial, Helvetica, sans-serif" font-size="52" font-weight="800" fill="#ffffff" letter-spacing="-1">Stock Pulse</text>
    <text x="4" y="45" font-family="Arial, Helvetica, sans-serif" font-size="19" fill="#e0e1dd" opacity="0.9">AI-Powered Stock Recommendation Engine</text>
    <text x="4" y="72" font-family="Arial, Helvetica, sans-serif" font-size="19" fill="#e0e1dd" opacity="0.9">for the Colombo Stock Exchange</text>
  </g>

  <!-- bottom tag pills -->
  <g font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="600">
    <rect x="60" y="220" width="118" height="30" rx="15" fill="#ffffff" fill-opacity="0.08"/>
    <text x="76" y="239" fill="#e0e1dd">XGBoost · ML</text>

    <rect x="188" y="220" width="150" height="30" rx="15" fill="#ffffff" fill-opacity="0.08"/>
    <text x="204" y="239" fill="#e0e1dd">34 Years of CSE Data</text>

    <rect x="348" y="220" width="140" height="30" rx="15" fill="#ffffff" fill-opacity="0.08"/>
    <text x="364" y="239" fill="#e0e1dd">Streamlit Dashboard</text>
  </g>
</svg>
